      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/CorpusId"
      responses:
        "200":
          description: 关键词历时演变信封
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeywordTrendEnvelope"
        "404":
