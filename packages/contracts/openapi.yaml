          minLength: 1
          pattern: ^[A-Za-z0-9._-]+$
      responses:
        '200':
          description: 可行性裁决（含攒证包）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GapFeasibilityVerdictResult'
        '404':
          description: GAP 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '409':
          description: 尚未做可行性核验 (GAP_NOT_FEASIBILITY_CHECKED，先 POST :feasibility)
