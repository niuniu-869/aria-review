      summary: 启动该 GAP 的价值核验（反向检索证伪 + 计量结构佐证，异步）
      description: 'value-evidence subagent 攒 EvidencePack（反向检索命中 + 计量结构指标）， 确定性 resolver 出 ValueVerdict（decided_by=deterministic）。异步：返回
