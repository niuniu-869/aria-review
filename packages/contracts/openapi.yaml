        抽取 research_question/method/findings/dataset/contribution 五字段，
        幂等 upsert 到 paper_extraction 表。

        reextract=false（默认）：已有 extraction 的篇自动跳过；reextract=true：强制覆盖更新。
        逐篇失败隔离：单篇 LLM/JSON/DB 错误不影响批次其他篇。
        支持 X-LLM-Key 头（用户自带 key）；无 key 时回退服务端 DEEPSEEK。
      tags: [library]
      parameters:
        - name: projectId
          in: path
          required: true
