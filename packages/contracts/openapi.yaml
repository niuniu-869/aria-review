  /projects/{projectId}/papers/import:
    post:
      operationId: importPapers
      summary: 导入 PDF/ZIP 到项目文献库（幂等，M1 BLOCKER）
      description: 'multipart/form-data 上传一个或多个 .pdf 文件，或一个包含 PDF 的 .zip 文件。

        流程：解压(若 ZIP) → 逐篇 ingest_pdfs（已有 sha256 缓存直接复用，不重复 MinerU） → add_paper（dedup by DOI or title hash）→
        add_paper_to_project（默认 candidate）。

        幂等：同一 PDF 重复导入（sha256/dedup_key 命中）→ skipped 计数增加，不报错， paperIds 仍含该 id。

        refs 文本（纯 DOI/题录）本期暂不支持，请使用 POST /projects/{projectId}/corpus/from-refs。

        '
      tags:
      - library
      parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: integer
          description: 项目 DB 主键（int）
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - files
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: 一个或多个 .pdf 文件，或一个 .zip 文件（内含 PDF）
                default_status:
                  type: string
                  enum:
                  - candidate
                  - included
                  - excluded
                  - maybe
                  default: candidate
                  description: 导入后的默认纳排状态
      responses:
        '200':
          description: 导入结果（含 imported/skipped/failed/paperIds）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PapersImportResponse'
        '400':
          description: 参数校验失败（缺少文件、非法 default_status 等）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrValidation'
        '404':
          description: 项目不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
  /projects/{projectId}/papers/from-search:
    post:
      operationId: addPapersFromSearch
      summary: 把检索候选批量入库并关联到项目（幂等，P2-T3）
      description: '接收来自 SearchTool 检索到的候选列表，逐条 add_paper（DOI/title dedup）→ add_paper_to_project（默认 candidate）。

        defaultStatus=included 时，关联后再调 set_inclusion 将状态升级为 included。

        幂等：同一候选（DOI/title 命中）重复提交 → skipped+1，不报错，paperIds 仍含该 id。

