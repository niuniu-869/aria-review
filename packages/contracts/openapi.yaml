      enum:
      - draft
      - verified
      - accepted
      - rejected
    GapSupportingPaper:
      type: object
      description: 支撑该 GAP 的论文证据（带源坐标 anchor_id，可经 EvidenceResolver 回定位原文块）
      required:
      - paper_id
      - anchor_id
      - quote
      properties:
        paper_id:
          type: integer
          description: 语料论文 DB 主键
        anchor_id:
          type: string
          description: 源坐标锚点 id
        quote:
          type: string
          description: 逐字保留的支撑引文（绝不顺手纠正）
    GapCounterEvidence:
      type: object
      description: 反证/张力证据（与 GAP 论断相左的发现）
      required:
      - paper_id
      - anchor_id
      - note
      properties:
        paper_id:
          type: integer
        anchor_id:
          type: string
        note:
          type: string
          description: 反证说明
    ValueThresholds:
      type: object
      description: 透明阈值（反「LLM 拍脑袋」：裁决依据可见、可配、可按领域传参）
      required:
      - reverse_hit_high
      - reverse_hit_low
      properties:
        reverse_hit_high:
          type: integer
          description: 默认 25；hit_count ≥ 此值判 likely_filled（伪空白）
        reverse_hit_low:
          type: integer
          description: 默认 3；hit_count ≤ 此值反向支持真空白
    ValueVerdict:
      type: object
      description: '研究方向价值裁决。由确定性 resolver 出，decided_by 恒为 deterministic； LLM 只产 statement + 攒 EvidencePack，绝不出
        verdict。

        '
      required:
      - gap_id
      - verdict
      - score
      - thresholds
      - rationale
      - decided_by
      properties:
        gap_id:
          type: string
        verdict:
          type: string
          enum:
          - valuable
          - likely_filled
          - inconclusive
        score:
          type: number
          nullable: true
          description: 量化分（可空：inconclusive 时可为 null）
        thresholds:
          $ref: '#/components/schemas/ValueThresholds'
        rationale:
          type: string
          description: 确定性规则的可读解释
        decided_by:
          type: string
          enum:
          - deterministic
          description: 恒为 deterministic（铁律：裁决由确定性代码出，非 LLM）
    GapCandidate:
      type: object
      description: '结构化 GAP 候选（scratchpad 条目）。confidence 为 LLM 自评仅供排序、非裁决依据； value_verdict 由确定性 resolver
        出，未核验时为 null。

        '
      required:
      - gap_id
      - theme
      - statement
      - lens
      - supporting_papers
      - counter_evidence
      - confidence
      - status
      - value_verdict
      properties:
        gap_id:
          type: string
        theme:
          type: string
          description: 所属主题簇
        statement:
          type: string
          description: GAP 论断（如「X 与 Y 的关系在 Z 情境下未被研究」）
        lens:
          $ref: '#/components/schemas/GapLens'
        supporting_papers:
          type: array
          items:
            $ref: '#/components/schemas/GapSupportingPaper'
        counter_evidence:
          type: array
          items:
            $ref: '#/components/schemas/GapCounterEvidence'
        confidence:
          type: number
          description: LLM 自评（0-1，仅供排序，非裁决依据）
        status:
          $ref: '#/components/schemas/GapStatus'
        value_verdict:
          description: 价值裁决；未核验时为 null
          oneOf:
          - $ref: '#/components/schemas/ValueVerdict'
          - type: 'null'
        feasibility_verdict:
          description: 可行性裁决（P2，与 novelty 解耦）；未核验时为 null
          oneOf:
          - $ref: '#/components/schemas/FeasibilityVerdict'
          - type: 'null'
        feasibility_pack:
          description: 可行性攒证包（collect-only，不含裁决）；未核验时为 null
          oneOf:
          - $ref: '#/components/schemas/FeasibilityPack'
          - type: 'null'
    FeasibilityVerdict:
      type: object
      description: '可行性裁决（P2 feasibility-scout）。状态机裁决（非浮点分），decided_by 恒
        deterministic；与 value/novelty 独立。'
      required:
      - gap_id
      - verdict
      - data_status
      - method_status
      - resource_status
      - decided_by
      properties:
        gap_id:
          type: string
        verdict:
          type: string
          enum: [buildable, hard, blocked]
          description: buildable=可做 / hard=有难度 / blocked=明确不可做
        data_status:
          type: string
          enum: [available, unknown, unavailable]
        method_status:
          type: string
          enum: [supported, unknown, blocked]
        resource_status:
          type: string
          enum: [modest, heavy, unknown]
        rationale:
          type: string
        decided_by:
          type: string
          enum: [deterministic]
        signals:
          type: object
          description: 原始状态三元组 + 证据计数，仅供 provenance/debug，非 UI 主判
          additionalProperties: true
    FeasibilityPack:
      type: object
      description: 可行性攒证包（submit_feasibility_pack 回传，collect-only；硬剥离裁决字段）
      required:
      - gap_id
      properties:
        gap_id:
          type: string
        data_availability:
          type: object
          additionalProperties: true
        method_base:
          type: object
          additionalProperties: true
        resource_scale:
          type: object
          additionalProperties: true
        negative_evidence:
          type: array
          items:
            type: object
            additionalProperties: true
        notes:
          type: array
          items:
            type: string
        skipped:
          type: array
          items:
            type: object
            additionalProperties: true
    ReverseSearchHit:
      type: object
      description: 反向检索命中条目（证伪：已有研究是否已填补该空白）
      required:
      - title
      - year
      - doi
      - relevance
      properties:
        title:
          type: string
        year:
          type: integer
          nullable: true
          description: 出版年（可空）
        doi:
          type: string
          nullable: true
          description: DOI（可空）
        relevance:
          type: number
          description: 与 GAP 论断的相关度（0-1）
    ReverseSearch:
      type: object
      description: 反向检索证据（statement→query→Sciverse/OpenAlex 命中计数，去重后）
      required:
      - query
      - provider
      - hit_count
      - top_hits
      properties:
        query:
          type: string
        provider:
          type: string
          enum:
          - sciverse
          - openalex
        hit_count:
          type: integer
          description: 近 N 年强相关计数（去重后，防同一文献多源重复计数虚高）
        top_hits:
          type: array
          items:
            $ref: '#/components/schemas/ReverseSearchHit'
    BiblioStructure:
      type: object
      description: 计量结构佐证（取自现有 R bibliometric 网络数据，不重算）
      required:
      - metric
      - value
      - interpretation
      - source_view
      properties:
        metric:
          type: string
          enum:
          - cooccurrence_gap
          - low_coupling
        value:
          type: number
        interpretation:
          type: string
          description: 确定性可读解释（如「两核心概念间存在共现断层」）
        source_view:
          type: string
          nullable: true
          description: 取自哪个分析视图（如 conceptual），可空
    EvidencePackSkipped:
      type: object
      description: fail-loud：跳过项显式表达（绝不静默成功空结果）
      required:
      - reason
      properties:
        reason:
          type: string
    EvidencePack:
      type: object
      description: '价值核验 subagent 攒的证据包（工具只规整结构、不算术、不裁决）。 gathered_by 恒为 subagent。

        '
      required:
      - gap_id
      - reverse_search
      - biblio_structure
      - gathered_by
      - skipped
      properties:
        gap_id:
          type: string
        reverse_search:
          $ref: '#/components/schemas/ReverseSearch'
        biblio_structure:
          $ref: '#/components/schemas/BiblioStructure'
        gathered_by:
          type: string
          enum:
          - subagent
        skipped:
          type: array
          items:
            $ref: '#/components/schemas/EvidencePackSkipped'
    GapVerdictResult:
      type: object
      description: 'GET .../verdict 返回体：价值裁决 + 攒证的证据包（§2.1「裁决 + 证据包」）。

        '
      required:
      - gap_id
      - verdict
      - evidence
      properties:
        gap_id:
          type: string
        verdict:
          $ref: '#/components/schemas/ValueVerdict'
        evidence:
          $ref: '#/components/schemas/EvidencePack'
    GapFeasibilityRequest:
      type: object
      description: ':feasibility 可选请求体；config 当前仅透传给状态机，字段可省略。'
      properties:
        config:
          type: object
          additionalProperties: true
    GapFeasibilityAccepted:
      type: object
      description: ':feasibility 202 受理体'
      required:
      - feasibility_run_id
      properties:
        feasibility_run_id:
          type: string
    GapFeasibilityVerdictResult:
      type: object
      description: GET .../feasibility-verdict 返回体：可行性裁决 + 攒证包。
      required:
      - gap_id
      - verdict
      - pack
      properties:
        gap_id:
          type: string
        verdict:
          $ref: '#/components/schemas/FeasibilityVerdict'
        pack:
          oneOf:
          - $ref: '#/components/schemas/FeasibilityPack'
          - type: 'null'
    ScratchpadState:
      type: object
      description: 本 run 实时工作记忆快照（类 harness 工作笔记；HITL 轮询视图）
      required:
      - run_id
      - run_status
      - entries
      - updated_at
      properties:
        run_id:
          type: string
        run_status:
          type: string
          enum:
          - running
          - done
          - failed
          description: '本 run 生命周期（轮询停止信号，codex B1-P1）。running 时前端持续轮询； done/failed 时前端停轮询。fail-loud：失败显式
            failed，绝不静默成 done。

            '
        entries:
          type: array
          items:
            $ref: '#/components/schemas/GapCandidate'
        updated_at:
          type: string
          description: ISO8601 更新时间
    GapDiscoverAccepted:
      type: object
      description: :discover 202 受理体
      required:
      - run_id
      properties:
        run_id:
          type: string
    GapVerifyAccepted:
      type: object
      description: :verify 202 受理体
      required:
      - verify_run_id
      properties:
        verify_run_id:
          type: string
    GapAcceptReject:
      type: object
      description: HITL accept/reject（改 status，不带 statement）
      required:
      - action
      properties:
        action:
          type: string
          enum:
          - accept
          - reject
    GapRevise:
      type: object
      description: HITL revise（必带非空 statement，回写论断并置回 draft 以便重核）
      required:
      - action
      - statement
      properties:
        action:
          type: string
          enum:
          - revise
        statement:
          type: string
          minLength: 1
          description: 改写后的新论断（revise 必填非空）
    GapPatchRequest:
      description: 'HITL 决策请求（codex B1-P2：用 oneOf 在契约层锁死「revise 必带 statement」）。 accept/reject 不带 statement；revise
        必带非空 statement。

        '
      oneOf:
      - $ref: '#/components/schemas/GapAcceptReject'
      - $ref: '#/components/schemas/GapRevise'
    SciverseBackfillFulltextRequest:
      properties:
        paperIds:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          title: Paperids
          description: 可选：只在这些 paper id 的交集内补全文
        maxPapers:
          type: integer
          minimum: 1.0
          title: Maxpapers
          description: 本次最多处理的候选论文数
          default: 50
        excludePaperIds:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          title: Excludepaperids
          description: 可选：跳过这些 paper id（前端多轮循环时传已失败项，避免失败项挡住后续候选）
      additionalProperties: false
      type: object
      title: SciverseBackfillFulltextRequest
    SciverseBackfillFulltextResult:
      properties:
        total:
          type: integer
          minimum: 0.0
          title: Total
          description: 本次条件下可补全文的论文总数
        fetched:
          type: integer
          minimum: 0.0
          title: Fetched
          description: 成功拉取并落库全文的论文数
        failed:
          items:
            $ref: '#/components/schemas/SciverseBackfillFailedItem'
          type: array
          title: Failed
        skipped:
          type: integer
          minimum: 0.0
          title: Skipped
          description: 因 maxPapers 上限本次未处理的论文数
        remaining:
          type: integer
          minimum: 0.0
          title: Remaining
          description: 仍有资格但本次未处理的论文数；>0 时可继续调用
      type: object
      required:
      - total
      - fetched
      - skipped
      - remaining
      title: SciverseBackfillFulltextResult
    SciverseBackfillFailedItem:
      properties:
        paperId:
          type: integer
          title: Paperid
        reason:
          type: string
          title: Reason
      type: object
      required:
      - paperId
      - reason
      title: SciverseBackfillFailedItem
