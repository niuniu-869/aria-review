        required: true
        description: R 分析语料 id（rCorpusId 字符串）
        schema:
          type: string
          minLength: 1
          pattern: ^[A-Za-z0-9._-]+$
      responses:
        '202':
          description: 已受理，GAP 发现 run 后台运行中
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GapDiscoverAccepted'
        '404':
          description: 项目或语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
