          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrNotFound"
        "409":
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrNotReady"

  /projects/{projectId}/corpus/{corpusId}/documents/cited-refs:
    get:
      operationId: getCitedRefs
      summary: "高被引参考文献表 (参考文献 | 次数, A4)"
      description: "返回可用性信封; available:false 也是 HTTP 200。需 CR 字段。"
      tags: [analysis]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/CorpusId"
      responses:
        "200":
          description: 高被引参考文献信封
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitedRefsEnvelope"
        "404":
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrNotFound"
        "409":
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrNotReady"

  /projects/{projectId}/corpus/{corpusId}/conceptual/thematic:
    get:
      operationId: getThematic
      summary: "主题战略图 (Callon 中心度×密度 四象限, A5)"
      description: "返回可用性信封; available:false 也是 HTTP 200。需 DE 字段。"
      tags: [analysis]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/CorpusId"
      responses:
        "200":
          description: 主题战略图信封
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThematicEnvelope"
        "404":
