                $ref: '#/components/schemas/ErrNotFound'
  /projects/{pid}/gaps/{gap_id}/feasibility-verdict:
    get:
      operationId: getGapFeasibilityVerdict
      summary: 取可行性裁决 + 攒证包（P2）
      description: 'FeasibilityVerdict 由确定性状态机 resolver 出（decided_by 恒 deterministic），
        与 novelty/value 独立；未核验时 409。

        '
