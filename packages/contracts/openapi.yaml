    get:
      operationId: getScratchpad
      summary: 拉取本 run 实时 scratchpad（HITL 视图/轮询）
      description: '类 harness 工作记忆：agent 在一次 GAP run 内反复读写的结构化条目（GapCandidate）。 前端像「研究笔记本」实时渲染，并喂回 LLM
