      operationId: getThreeField
      summary: "三字段 Sankey (作者→关键词→来源, A5)"
      description: "返回可用性信封; available:false 也是 HTTP 200。需 AU+DE+SO 字段。"
      tags: [analysis]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/CorpusId"
      responses:
        "200":
          description: 三字段 Sankey 信封
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreeFieldEnvelope"
        "404":
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrNotFound"
        "409":
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrNotReady"

  /projects/{projectId}/corpus/{corpusId}/conceptual:
    get:
      operationId: getConceptual
      summary: 概念结构 (关键词共现网络)
      tags: [analysis]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/CorpusId"
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 100 }, description: "返回 top-N 节点 (按强度); 前端滑块客户端切片" }
      responses:
        "200":
          description: 关键词共现网络
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkResult"
        "404":
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrNotFound"
        "409":
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrNotReady"

  /projects/{projectId}/corpus/{corpusId}/intellectual:
    get:
      operationId: getIntellectual
      summary: 知识结构 (参考文献共被引网络)
      tags: [analysis]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/CorpusId"
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 100 }, description: "返回 top-N 节点 (按强度); 前端滑块客户端切片" }
      responses:
        "200":
          description: 共被引网络
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkResult"
        "404":
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrNotFound"
        "409":
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrNotReady"

  /projects/{projectId}/corpus/{corpusId}/social:
    get:
      operationId: getSocial
      summary: 社会结构 (作者/国家合作网络)
      tags: [analysis]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/CorpusId"
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 100 }, description: "返回 top-N 节点 (按强度); 前端滑块客户端切片" }
      responses:
        "200":
          description: 合作网络
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialResult"
        "404":
