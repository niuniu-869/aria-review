      operationId: patchGap
      summary: HITL 人工 accept/reject/revise
      description: '人在环上裁决：accept/reject 改 status；revise 回写 statement（并置回 draft 以便重核）。 决策留痕进 runlog。绝不自动定稿（HITL
        红线）。

        '
      tags:
      - research
      parameters:
      - name: pid
        in: path
        required: true
        schema:
          type: integer
      - name: gap_id
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          pattern: ^[A-Za-z0-9._-]+$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GapPatchRequest'
      responses:
        '200':
          description: 更新后的 GapCandidate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GapCandidate'
        '400':
          description: action/statement 校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrValidation'
        '404':
          description: GAP 不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
  /projects/{pid}/papers/fulltext:backfill:
    post:
      tags:
      - sciverse
      - library
      summary: Backfill Sciverse Fulltext Endpoint
      description: 批量为项目内 Sciverse doc_id 文献补全文。
      operationId: backfill_sciverse_fulltext_endpoint_projects__pid__papers_fulltext_backfill_post
      parameters:
      - name: pid
        in: path
        required: true
        schema:
          type: integer
          title: Pid
      - name: X-Sciverse-Base-URL
        in: header
        required: false
        schema:
          type: string
      - name: X-Sciverse-Token
        in: header
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SciverseBackfillFulltextRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SciverseBackfillFulltextResult'
        '400':
          description: Sciverse 未配置或参数非法
        '404':
          description: 项目不存在
components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    CorpusId:
      name: corpusId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: 上传重试去重键 (step1-P1)
      schema:
        type: string
        minLength: 8
        maxLength: 128
  schemas:
    PublicStats:
      type: object
      required:
      - papers
      - blockAnchors
      - dois
      properties:
        papers:
          type: integer
          description: 入库文献总数
        blockAnchors:
          type: integer
          description: 块级溯源锚点数（全文精读文档的块总数）
        dois:
          type: integer
          description: 去重 DOI 数
    Health:
      type: object
      required:
      - status
      - service
      properties:
        status:
          type: string
          enum:
          - ok
        service:
          type: string
          example: agent
        rService:
          type: string
          enum:
          - up
          - down
          - unknown
          description: 下游 R 分析服务可达性
    DbSource:
      type: string
      description: 数据来源, 切片1 仅 wos/scopus, pubmed/openalex 后续 (Codex-13)
      enum:
      - wos
      - scopus
    CorpusStatus:
      type: string
      description: 语料状态机 (Codex-5)
      enum:
      - parsing
      - ready
      - failed
    CorpusBase:
      type: object
      required:
      - corpusId
      - projectId
      - status
      - schemaVersion
      - dbsource
      - createdAt
      properties:
        corpusId:
          type: string
          format: uuid
        projectId:
          type: string
        status:
          $ref: '#/components/schemas/CorpusStatus'
        schemaVersion:
          type: integer
          const: 1
          description: artifact schema 版本 (Codex-2/Codex-10)
        dbsource:
          $ref: '#/components/schemas/DbSource'
        createdAt:
          type: string
          format: date-time
    CorpusParsing:
      allOf:
      - $ref: '#/components/schemas/CorpusBase'
      - type: object
        required:
        - status
        properties:
          status:
            const: parsing
    CorpusReady:
      allOf:
      - $ref: '#/components/schemas/CorpusBase'
      - type: object
        required:
        - status
        - documentCount
        properties:
          status:
            const: ready
          documentCount:
            type: integer
            minimum: 0
    CorpusFailed:
      allOf:
      - $ref: '#/components/schemas/CorpusBase'
      - type: object
        required:
        - status
        - error
        properties:
          status:
            const: failed
          error:
            type: string
            description: 失败原因, 已脱敏 (Codex-18)
    CorpusRef:
      oneOf:
      - $ref: '#/components/schemas/CorpusParsing'
      - $ref: '#/components/schemas/CorpusReady'
      - $ref: '#/components/schemas/CorpusFailed'
      discriminator:
        propertyName: status
        mapping:
          parsing: '#/components/schemas/CorpusParsing'
          ready: '#/components/schemas/CorpusReady'
          failed: '#/components/schemas/CorpusFailed'
    ProjectCreateRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        researchQuestion:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
    ProjectRenameRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
    ProjectRef:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          nullable: true
    ProjectListResponse:
      type: object
      required:
      - projects
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/ProjectRef'
    ActiveCorpusDetail:
      type: object
      description: '项目当前 active corpus 摘要，内嵌于 ProjectDetail。 corpusId 为 Postgres DB integer；rCorpusId
        为 R 字符串 ID（调分析端点时透传）。 stale=true 表示当前 included 集合与本 corpus 的 contentHash 不同，需重算。

        '
      required:
      - corpusId
      - status
      - documentCount
      - contentHash
      - stale
      properties:
        corpusId:
          type: integer
          description: Postgres DB corpus.id
        rCorpusId:
          type: string
          nullable: true
          description: R 字符串语料 ID；status != ready 时为 null
        status:
          type: string
          enum:
          - parsing
          - ready
          - failed
        documentCount:
          type: integer
          minimum: 0
        contentHash:
          type: string
          description: included 集合指纹（sha256）
        stale:
          type: boolean
          description: 当前 included 集合与 corpus 快照不同时为 true
        errorReason:
          type: string
          nullable: true
          description: 构建失败原因；activeCorpus 通常为 null
    LatestCorpusDetail:
      type: object
      description: 项目最近一次 corpus 构建摘要，不按 status 过滤；failed 时带 errorReason。
      required:
      - corpusId
      - status
      - contentHash
      properties:
        corpusId:
          type: integer
          description: Postgres DB corpus.id
        rCorpusId:
          type: string
          nullable: true
          description: R 字符串语料 ID；status != ready 时为 null
        status:
          type: string
          enum:
          - parsing
          - ready
          - failed
        documentCount:
          type: integer
          nullable: true
          minimum: 0
        contentHash:
          type: string
          description: included 集合指纹（sha256）
        errorReason:
          type: string
          nullable: true
          description: 构建失败原因；仅 failed 时通常非空
        createdAt:
          type: string
          nullable: true
          format: date-time
    ProjectDetail:
      type: object
      description: 项目详情；activeCorpus 保持最新 ready 语义，latestCorpus 暴露最近一次构建状态。
      required:
      - id
      - name
      - paperCount
      - includedCount
      - readableFulltextCount
      properties:
        id:
          type: integer
        name:
          type: string
        researchQuestion:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        paperCount:
          type: integer
          minimum: 0
        includedCount:
          type: integer
          minimum: 0
        readableFulltextCount:
          type: integer
          minimum: 0
          description: 可用于综述生成的全文篇数：included 文献中，存在 sha256 且 markdown_path 可读非空的文献数。
        activeCorpus:
          allOf:
          - $ref: '#/components/schemas/ActiveCorpusDetail'
          nullable: true
          description: 最新 ready corpus；无 ready corpus 时为 null
        latestCorpus:
          allOf:
          - $ref: '#/components/schemas/LatestCorpusDetail'
          nullable: true
          description: 最近一条 corpus，不过滤 status；失败构建也会返回
    CorpusMaterializeResponse:
      type: object
      description: POST /projects/{pid}/corpus/materialize 响应体
      required:
      - corpusId
      - status
      - documentCount
      - contentHash
      properties:
        corpusId:
          type: integer
          description: Postgres DB corpus.id
        rCorpusId:
          type: string
          nullable: true
          description: R 字符串语料 ID；status=parsing/failed 时为 null
        status:
          type: string
          enum:
          - parsing
          - ready
