          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrNotFound"
        "409":
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrNotReady"

  /library/stats:
    get:
      operationId: getLibraryStats
      summary: 全局文献库统计（totalPapers/withMetadata/withPdf/OCR分布）
      tags: [library]
      responses:
        "200":
          description: 全局文献库统计
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryStats"

  /projects/{projectId}/library/stats:
    get:
      operationId: getProjectLibraryStats
      summary: 项目作用域文献库统计（含纳排分布）
      tags: [library]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 项目文献库统计
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectLibraryStats"
        "404":
          description: 项目不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrNotFound"

  /projects/{projectId}/papers/{paperId}:
    get:
      operationId: getPaperDetail
      summary: 取项目内单篇文献详情（含 tags/notes/纳排状态/结构化抽取结果）
      tags: [library]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
            description: 项目 DB 主键（int）
        - name: paperId
          in: path
          required: true
          schema:
            type: integer
            description: 文献 DB 主键（int）
      responses:
        "200":
          description: 单篇文献详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperDetail"
        "404":
          description: 项目或文献不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrNotFound"

  /projects/{projectId}/papers/import:
    post:
      operationId: importPapers
      summary: 导入 PDF/ZIP 到项目文献库（幂等，M1 BLOCKER）
      description: >
        multipart/form-data 上传一个或多个 .pdf 文件，或一个包含 PDF 的 .zip 文件。

        流程：解压(若 ZIP) → 逐篇 ingest_pdfs（已有 sha256 缓存直接复用，不重复 MinerU）
        → add_paper（dedup by DOI or title hash）→ add_paper_to_project（默认 candidate）。

        幂等：同一 PDF 重复导入（sha256/dedup_key 命中）→ skipped 计数增加，不报错，
        paperIds 仍含该 id。

        refs 文本（纯 DOI/题录）本期暂不支持，请使用
        POST /projects/{projectId}/corpus/from-refs。
      tags: [library]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
            description: 项目 DB 主键（int）
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: 一个或多个 .pdf 文件，或一个 .zip 文件（内含 PDF）
                default_status:
                  type: string
                  enum: [candidate, included, excluded, maybe]
                  default: candidate
                  description: 导入后的默认纳排状态
      responses:
        "200":
