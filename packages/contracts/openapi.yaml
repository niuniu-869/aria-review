openapi: 3.1.0
info:
  title: BiblioCN Public API (web to agent)
  version: 0.2.0
  description: '三服务再架构的公共 API 契约 (前端 to Python agent 后端)。 单一真源 (Codex-10): 前后端类型由本文件生成, CI 用响应快照防业务语义漂移。
    artifact 带 schemaVersion (Codex-2/Codex-10)。corpus 走显式状态机, 用 oneOf+discriminator 按状态强建模 (Codex 二审
    step1-P1)。错误响应收窄到固定 code, 防契约漂移。

    '
servers:
- url: http://localhost:8000
  description: 本地 agent 服务
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: 存活探针
      tags:
      - meta
      responses:
        '200':
          description: 健康
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
  /public/stats:
    get:
      operationId: getPublicStats
      summary: 公开着陆页统计（免认证）
      tags:
      - meta
      responses:
        '200':
          description: 真实入库规模
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicStats'
  /projects/{projectId}/corpus:
    post:
      operationId: createCorpus
      summary: 上传文献文件并异步解析为语料 (状态机入口, Codex-5)
      description: '幂等: Phase 1 (T10) 起强制 — 携带 Idempotency-Key 时, 相同 (key, projectId) 的重试 返回同一 corpus;
        未带 key 时以 (contentHash, dbsource, projectId) 去重。 Phase 0: 接受 Idempotency-Key 头但暂不去重 (Codex step3-P2,
        不过度声称)。

        '
      tags:
      - corpus
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              - dbsource
              properties:
                file:
                  type: string
                  format: binary
                dbsource:
                  $ref: '#/components/schemas/DbSource'
      responses:
        '202':
          description: 已受理, 后台解析中 (status=parsing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusRef'
        '400':
          description: 表单/参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrValidation'
        '413':
          description: 文件超限 (沿用 50MB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrPayloadTooLarge'
        '415':
          description: 不支持的文件类型/内容无法解析为所选 dbsource (step1-P2)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrUnsupportedFile'
  /projects/{projectId}/corpus/from-topic:
    post:
      operationId: createCorpusFromTopic
      summary: 主题词检索建库 (路径 A, OpenAlex)
      description: '输入研究主题词, 经 OpenAlex 检索近 N 年文献并补全引用题录, 组装为 WoS plaintext 后由 bibliometrix 建为可分析语料。同步返回
        (Phase 0)。

        '
      tags:
      - corpus
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopicRequest'
      responses:
        '202':
          description: 已建库 (status=ready/failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusRef'
        '400':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrValidation'
        '422':
          description: OpenAlex 无结果或解析失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrValidation'
  /projects/{projectId}/corpus/from-refs:
    post:
      operationId: createCorpusFromRefs
      summary: 参考文献文本建库 (路径 B, LLM 抽取 + OpenAlex 反查)
      description: '粘贴非结构化参考文献文本, agent 用 LLM 抽取题录, 再经 OpenAlex 反查补全 元数据并建为语料。响应含 matched/unmatched/extracted
        统计。

        '
      tags:
      - corpus
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefsRequest'
      responses:
        '202':
          description: 已建库 (status=ready/failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusRef'
        '422':
          description: 未识别出论文条目或均未在 OpenAlex 匹配
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrValidation'
  /projects:
    get:
      operationId: listProjects
      summary: 列出所有项目
      tags:
      - projects
      responses:
        '200':
          description: 项目列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
    post:
      operationId: createProject
      summary: 创建新项目
      tags:
      - projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectRef'
        '422':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrValidation'
  /projects/{pid}:
    get:
      operationId: getProject
      summary: 获取项目详情
      description: 返回项目统计、当前 activeCorpus（最新 ready）和 latestCorpus（最近一次构建，含失败原因）。
      tags:
      - projects
      parameters:
      - name: pid
        in: path
        required: true
        schema:
          type: integer
        description: 项目 DB id（整数）
      responses:
        '200':
          description: 项目详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
        '404':
          description: 项目不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
    delete:
      operationId: deleteProject
      summary: 删除项目
      description: 删除项目及其子表数据（DB ondelete=CASCADE 级联）；共享 Paper 题录实体不受影响。
      tags:
      - projects
      parameters:
      - name: pid
        in: path
        required: true
        schema:
          type: integer
        description: 项目 DB id（整数）
      responses:
        '204':
          description: 删除成功
        '404':
          description: 项目不存在（或不属于当前用户）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    patch:
      operationId: renameProject
      summary: 重命名项目
      tags:
      - projects
      parameters:
      - name: pid
        in: path
        required: true
        schema:
          type: integer
        description: 项目 DB id（整数）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRenameRequest'
      responses:
        '200':
          description: 更新后的项目
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectRef'
        '404':
          description: 项目不存在（或不属于当前用户）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: 项目名已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '422':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrValidation'
  /projects/{pid}/corpus/materialize:
    post:
      operationId: materializeCorpus
      summary: 'M2: 物化项目 included 论文为可分析语料（幂等）'
      description: '从项目当前 included 论文集合构建冻结语料快照，并调 R /parse-from-records 建库。 幂等：相同 included 集合（content_hash
        一致）命中已有 ready corpus 直接复用。 included 为空时返回 422 EMPTY_INCLUDED。

        '
      tags:
      - corpus
      parameters:
      - name: pid
        in: path
        required: true
        schema:
          type: integer
        description: 项目 DB id（整数）
      responses:
        '200':
          description: 语料物化成功（ready 或已复用）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusMaterializeResponse'
        '404':
          description: 项目不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '422':
          description: included 论文为空（EMPTY_INCLUDED）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrValidation'
        '502':
          description: R 服务不可达或建库失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrValidation'
  /projects/{projectId}/corpus/{corpusId}:
    get:
      operationId: getCorpus
      summary: 查询语料状态, 前端据此 gating (Codex-5)
      tags:
      - corpus
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      responses:
        '200':
          description: 语料引用 (按状态强建模)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusRef'
        '404':
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
  /projects/{projectId}/corpus/{corpusId}/overview:
    get:
      operationId: getOverview
      summary: 领域概览分析, 仅 status=ready 可取
      tags:
      - analysis
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      responses:
        '200':
          description: 概览结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverviewResult'
        '404':
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '409':
          description: 语料仍在解析 (CORPUS_NOT_READY, 可重试轮询)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotReady'
        '422':
          description: 语料解析失败的终态 (PARSE_FAILED, 不应重试; step1-P1)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrParseFailed'
        '502':
          description: R 服务返回坏响应 (ANALYSIS_FAILED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrAnalysisFailed'
        '503':
          description: R 服务不可达/熔断 (R_SERVICE_UNAVAILABLE; step1-P1, 区别于 502)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrRUnavailable'
  /projects/{projectId}/corpus/{corpusId}/sources:
    get:
      operationId: getSources
      summary: 来源分析 (核心期刊/h指数/Bradford)
      tags:
      - analysis
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      responses:
        '200':
          description: 来源分析结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourcesResult'
        '404':
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '409':
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotReady'
  /projects/{projectId}/corpus/{corpusId}/authors:
    get:
      operationId: getAuthors
      summary: 作者分析 (高产作者/h指数/Lotka)
      tags:
      - analysis
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      responses:
        '200':
          description: 作者分析结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorsResult'
        '404':
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '409':
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotReady'
  /projects/{projectId}/corpus/{corpusId}/documents:
    get:
      operationId: getDocuments
      summary: 文档与关键词 (高被引/词频)
      tags:
      - analysis
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      responses:
        '200':
          description: 文档与关键词结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentsResult'
        '404':
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '409':
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotReady'
  /projects/{projectId}/corpus/{corpusId}/authors/production:
    get:
      operationId: getAuthorProduction
      summary: '作者年度产出时间线 (热力图: 作者 × 年份, A4)'
      description: 返回可用性信封; available:false 也是 HTTP 200。需 PY 字段。
      tags:
      - analysis
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      responses:
        '200':
          description: 作者年度产出信封
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorProductionEnvelope'
        '404':
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '409':
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotReady'
  /projects/{projectId}/corpus/{corpusId}/documents/keyword-trend:
    get:
      operationId: getKeywordTrend
      summary: 关键词历时演变 (themeRiver / 堆叠面积, A4)
      description: 返回可用性信封; available:false 也是 HTTP 200。需 DE+PY 字段。
      tags:
      - analysis
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      responses:
        '200':
          description: 关键词历时演变信封
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeywordTrendEnvelope'
        '404':
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '409':
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotReady'
  /projects/{projectId}/corpus/{corpusId}/documents/cited-refs:
    get:
      operationId: getCitedRefs
      summary: 高被引参考文献表 (参考文献 | 次数, A4)
      description: 返回可用性信封; available:false 也是 HTTP 200。需 CR 字段。
      tags:
      - analysis
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      responses:
        '200':
          description: 高被引参考文献信封
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitedRefsEnvelope'
        '404':
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '409':
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotReady'
  /projects/{projectId}/corpus/{corpusId}/conceptual/thematic:
    get:
      operationId: getThematic
      summary: 主题战略图 (Callon 中心度×密度 四象限, A5)
      description: 返回可用性信封; available:false 也是 HTTP 200。需 DE 字段。
      tags:
      - analysis
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      responses:
        '200':
          description: 主题战略图信封
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThematicEnvelope'
        '404':
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '409':
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotReady'
  /projects/{projectId}/corpus/{corpusId}/conceptual/evolution:
    get:
      operationId: getEvolution
      summary: 主题演进图 (多周期主题流 / Sankey, A5)
      description: 返回可用性信封; available:false 也是 HTTP 200。需 DE+PY 且跨度可切≥2 周期。
      tags:
      - analysis
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      responses:
        '200':
          description: 主题演进图信封
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvolutionEnvelope'
        '404':
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '409':
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotReady'
  /projects/{projectId}/corpus/{corpusId}/intellectual/histcite:
    get:
      operationId: getHistcite
      summary: 历史引文图 (时序分层引用脉络, A5)
      description: 返回可用性信封; available:false 也是 HTTP 200。需 CR 字段; 节点<2 → not_enough_data。
      tags:
      - analysis
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      responses:
        '200':
          description: 历史引文图信封
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistciteEnvelope'
        '404':
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '409':
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotReady'
  /projects/{projectId}/corpus/{corpusId}/overview/threefield:
    get:
      operationId: getThreeField
      summary: 三字段 Sankey (作者→关键词→来源, A5)
      description: 返回可用性信封; available:false 也是 HTTP 200。需 AU+DE+SO 字段。
      tags:
      - analysis
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      responses:
        '200':
          description: 三字段 Sankey 信封
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreeFieldEnvelope'
        '404':
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '409':
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotReady'
  /projects/{projectId}/corpus/{corpusId}/conceptual:
    get:
      operationId: getConceptual
      summary: 概念结构 (关键词共现网络)
      tags:
      - analysis
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 100
        description: 返回 top-N 节点 (按强度); 前端滑块客户端切片
      responses:
        '200':
          description: 关键词共现网络
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkResult'
        '404':
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '409':
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotReady'
  /projects/{projectId}/corpus/{corpusId}/intellectual:
    get:
      operationId: getIntellectual
      summary: 知识结构 (参考文献共被引网络)
      tags:
      - analysis
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 100
        description: 返回 top-N 节点 (按强度); 前端滑块客户端切片
      responses:
        '200':
          description: 共被引网络
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkResult'
        '404':
          description: 语料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotFound'
        '409':
          description: 语料未就绪
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrNotReady'
  /projects/{projectId}/corpus/{corpusId}/social:
    get:
      operationId: getSocial
      summary: 社会结构 (作者/国家合作网络)
      tags:
      - analysis
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/CorpusId'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 100
        description: 返回 top-N 节点 (按强度); 前端滑块客户端切片
      responses:
        '200':
          description: 合作网络
          content:
