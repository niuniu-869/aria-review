      description: 'text/event-stream：消除长精读/核验阶段黑箱。先订阅频道 → 补发 events_json
        历史（Last-Event-ID 断点续传）→ 按 seq 去重转发实时，直到父终态（done/done_empty/error）关流。
        事件类型：started / summarizing(done,total) / discovering / subagent_event(child_type) /
        verifying / done | done_empty | error。

        '
