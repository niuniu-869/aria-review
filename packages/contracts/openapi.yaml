      description: '以 PaperSummary（map 阶段产物）为输入，gap-finder subagent 用 scratchpad 迭代产出 GapCandidate（concept/method/theory
        三 lens）。异步：返回 run_id， 前端轮询 GET .../scratchpad 看实时累积。HITL：不自动定稿。

